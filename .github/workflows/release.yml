name: Release

on:
  push:
    branches:
      - main

env:
  OWNER: sakithasamarathunga33

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Auto-bump version from commit message prefix:
      #   feat:            → minor bump  (v1.0.0 → v1.1.0)
      #   fix: / chore: / etc → patch bump  (v1.0.0 → v1.0.1)
      #   BREAKING CHANGE  → major bump  (v1.0.0 → v2.0.0)
      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/vps-web:latest
            ghcr.io/${{ env.OWNER }}/vps-web:${{ steps.tag.outputs.new_tag }}

      - name: Build and push node-api
        uses: docker/build-push-action@v5
        with:
          build-args: PULSENODE_VERSION=${{ steps.tag.outputs.new_tag }}
          context: .
          file: Dockerfile
          target: node-api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/vps-node-api:latest
            ghcr.io/${{ env.OWNER }}/vps-node-api:${{ steps.tag.outputs.new_tag }}

      - name: Build and push python-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.python
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/vps-python-api:latest
            ghcr.io/${{ env.OWNER }}/vps-python-api:${{ steps.tag.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: PulseNode ${{ steps.tag.outputs.new_tag }}
          body: |
            ## PulseNode ${{ steps.tag.outputs.new_tag }}

            ### One-command install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/SakithaSamarathunga33/vps/main/install.sh | bash
            ```

            When the installer finishes, it prints your dashboard URL — open it and you're live.

            ### Docker images (GitHub Container Registry)

            | Image | Tags |
            |-------|------|
            | `ghcr.io/sakithasamarathunga33/vps-web` | `${{ steps.tag.outputs.new_tag }}`, `latest` |
            | `ghcr.io/sakithasamarathunga33/vps-node-api` | `${{ steps.tag.outputs.new_tag }}`, `latest` |
            | `ghcr.io/sakithasamarathunga33/vps-python-api` | `${{ steps.tag.outputs.new_tag }}`, `latest` |

            ### Changes
            ${{ steps.tag.outputs.changelog }}
          files: install.sh
          generate_release_notes: false
