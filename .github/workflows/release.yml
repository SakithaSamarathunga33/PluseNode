name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  OWNER: sakithasamarathunga33

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag
        id: tag
        run: echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/vps-web:latest
            ghcr.io/${{ env.OWNER }}/vps-web:${{ steps.tag.outputs.value }}

      - name: Build and push node-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: node-api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/vps-node-api:latest
            ghcr.io/${{ env.OWNER }}/vps-node-api:${{ steps.tag.outputs.value }}

      - name: Build and push python-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.python
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/vps-python-api:latest
            ghcr.io/${{ env.OWNER }}/vps-python-api:${{ steps.tag.outputs.value }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PulseNode ${{ steps.tag.outputs.value }}
          body: |
            ## PulseNode ${{ steps.tag.outputs.value }}

            ### One-command install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/SakithaSamarathunga33/vps/main/install.sh | bash
            ```

            When the installer finishes, it prints your dashboard URL — open it and you're live.

            ### Docker images (GitHub Container Registry)

            | Image | Tags |
            |-------|------|
            | `ghcr.io/sakithasamarathunga33/vps-web` | `${{ steps.tag.outputs.value }}`, `latest` |
            | `ghcr.io/sakithasamarathunga33/vps-node-api` | `${{ steps.tag.outputs.value }}`, `latest` |
            | `ghcr.io/sakithasamarathunga33/vps-python-api` | `${{ steps.tag.outputs.value }}`, `latest` |

            ### Manual install with pre-built images
            ```bash
            git clone https://github.com/SakithaSamarathunga33/vps.git && cd vps
            ./deploy.sh   # prompts for IP, writes config, pulls images, starts everything
            ```
          files: install.sh
          generate_release_notes: true
