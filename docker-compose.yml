services:
  caddy:
    image: caddy:2-alpine
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    depends_on:
      - web
      - go-api
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 32M

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_GO_API: ${NEXT_PUBLIC_GO_API:-/go}
    environment:
      GO_API_INTERNAL: http://go-api:4002
    depends_on:
      - go-api
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 40M

  go-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      GO_PORT: 4002
      GO_API_AUTH: ${GO_API_AUTH:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      NEXT_PUBLIC_ORIGIN: ${NEXT_PUBLIC_ORIGIN:-}
      COOLIFY_API_URL: ${COOLIFY_API_URL:-}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN:-}
      AES_KEY: ${AES_KEY:-}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      TRAEFIK_NETWORK: ${TRAEFIK_NETWORK:-}
      DATABASE_PATH: /data/pulsenode.db
      PULSENODE_DATA_DIR: /var/lib/pulsenode
      PULSENODE_VERSION: ${PULSENODE_VERSION:-dev}
      PULSENODE_WORKSPACE: /workspace
      PULSENODE_OVERLAY: ${PULSENODE_OVERLAY:-docker-compose.standalone.yml}
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pn-go-data:/var/lib/pulsenode
      - pn-sqlite-data:/data
      - ${PULSENODE_INSTALL_DIR:-.}:/workspace
    pid: "host"
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 32M

volumes:
  pn-go-data:
  pn-sqlite-data:
  caddy-data:
  caddy-config:
