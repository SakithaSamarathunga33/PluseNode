services:
  nginx:
    image: nginx:alpine
    depends_on:
      - web
      - node-api
      - python-api
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - default
      - proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.vps.rule: "Host(`vps.sakitha.com`)"
      traefik.http.routers.vps.entrypoints: "websecure"
      traefik.http.routers.vps.tls.certresolver: "letsencrypt"
      traefik.http.services.vps.loadbalancer.server.port: "80"
      traefik.docker.network: "vps-monitor_proxy"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 32M

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_NODE_API: ${NEXT_PUBLIC_NODE_API:-}
        NEXT_PUBLIC_PYTHON_API: ${NEXT_PUBLIC_PYTHON_API:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    depends_on:
      - node-api
      - python-api
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 40M

  node-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: node-api
    environment:
      NODE_ENV: production
      NODE_PORT: 4001
      NODE_API_AUTH: ${NODE_API_AUTH:-false}
      NODE_API_SECRET: ${NODE_API_SECRET:-change-me}
      NEXT_PUBLIC_ORIGIN: ${NEXT_PUBLIC_ORIGIN:-https://vps.sakitha.com}
      COOLIFY_API_URL: ${COOLIFY_API_URL:-}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pn-data:/app/data
    pid: "host"
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 160M
        reservations:
          memory: 48M

  python-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      NEXT_PUBLIC_ORIGIN: ${NEXT_PUBLIC_ORIGIN:-https://vps.sakitha.com}
      DATABASE_URL: ${DATABASE_URL:-}
    pid: "host"
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 96M
        reservations:
          memory: 32M

volumes:
  pn-data:

networks:
  proxy:
    external: true
    name: vps-monitor_proxy
