services:
  caddy:
    image: caddy:2-alpine
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    depends_on:
      - web
      - go-api
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - default
      - proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.vps.rule: "Host(`vps.sakitha.com`)"
      traefik.http.routers.vps.entrypoints: "websecure"
      traefik.http.routers.vps.tls.certresolver: "letsencrypt"
      traefik.http.services.vps.loadbalancer.server.port: "80"
      traefik.docker.network: "vps-monitor_proxy"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 32M

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_GO_API: ${NEXT_PUBLIC_GO_API:-https://vps.sakitha.com/go}
    depends_on:
      - go-api
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 40M

  go-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      GO_PORT: 4002
      GO_API_AUTH: ${GO_API_AUTH:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      NEXT_PUBLIC_ORIGIN: ${NEXT_PUBLIC_ORIGIN:-https://vps.sakitha.com}
      COOLIFY_API_URL: ${COOLIFY_API_URL:-}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-}
      PULSENODE_DATA_DIR: /var/lib/pulsenode
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pn-go-data:/var/lib/pulsenode
    pid: "host"
    restart: unless-stopped
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 32M

volumes:
  pn-go-data:
  caddy-data:
  caddy-config:

networks:
  proxy:
    external: true
    name: vps-monitor_proxy
