services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API: ${NEXT_PUBLIC_API:-}
        NEXT_PUBLIC_SSE_URL: ${NEXT_PUBLIC_SSE_URL:-}
        PULSENODE_VERSION: ${PULSENODE_VERSION:-dev}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - go-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 40M

  go-api:
    build:
      context: .
      dockerfile: Dockerfile.go
    environment:
      GO_PORT: 4001
      API_AUTH: ${API_AUTH:-false}
      API_SECRET: ${API_SECRET:-change-me}
      NEXT_PUBLIC_ORIGIN: ${NEXT_PUBLIC_ORIGIN:-http://localhost:3000}
      COOLIFY_API_URL: ${COOLIFY_API_URL:-}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-}
      PULSENODE_VERSION: ${PULSENODE_VERSION:-dev}
      VPS_REGION: ${VPS_REGION:-}
    ports:
      - "${GO_PORT:-4001}:4001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pn-data:/app/data
    pid: "host"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 96M
        reservations:
          memory: 24M

volumes:
  pn-data:
