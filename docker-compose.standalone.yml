# Standalone deployment overlay — used by deploy.sh
# Adds Caddy as the single public entry point on port 80.
# Usage: docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d --build

services:
  caddy:
    image: caddy:2-alpine
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    ports:
      - "${LISTEN_PORT:-80}:80"
      - "${HTTPS_LISTEN_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - go-api
    restart: unless-stopped
