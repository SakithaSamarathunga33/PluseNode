# Standalone deployment overlay — used by deploy.sh
# Adds Nginx as the single public entry point on port 80.
# Usage: docker compose -f docker-compose.yml -f docker-compose.standalone.yml up -d --build

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${LISTEN_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - node-api
      - python-api
    restart: unless-stopped
